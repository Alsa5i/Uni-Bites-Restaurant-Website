<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Uni-Bite</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="logo"><img src="uni%20logo.jpeg" alt="Uni-Bite" /></div>
        <nav class="top-nav">
          <a href="index (3).html#categories">Categories</a>
          <a href="contact.html">Contact</a>
          <a href="profile.html">Profile</a>
          <div class="nav-auth">
            <a class="nav-btn" href="login.html">Log In</a>
            <a class="nav-btn nav-btn-primary" href="signin.html">Sign In</a>
          </div>
        </nav>
      </div>
    </header>

    <section class="auth-page">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-sub">Log in to your Uni-Bite account</p>

        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>

        <form id="loginForm" novalidate>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required />

          <button type="submit" class="auth-submit">Log In</button>
        </form>

        <p class="auth-switch">
          Don't have an account? <a href="signin.html">Sign in</a>
        </p>
      </div>
    </section>

    <script src="auth.js"></script>
    <script src="nav.js"></script>
    <script>
      Auth.initLogin();
    </script>
  </body>
</html>
