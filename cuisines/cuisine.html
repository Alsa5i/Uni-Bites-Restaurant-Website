<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuisine | Uni-Bite</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="logo"><img src="../uni%20logo.jpeg" alt="Uni-Bite" /></div>
        <div class="top-search">
          <span class="search-icon"><svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" placeholder="Search for food and cuisines" />
        </div>
        <nav class="top-nav">
          <a href="../index (3).html#categories">Categories</a>
          <a href="../contact.html">Contact</a>
          <a href="../profile.html">Profile</a>
        </nav>
        <button class="cart-btn" id="cartBtn"><svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 0 0 0 2 1.61h9.72a2 0 0 0 2-1.61L23 6H6"/></svg> <span class="cart-badge" id="cartBadge">0</span></button>
      </div>
    </header>

    <section class="hero">
      <div class="hero-inner">
        <h1 id="cuisineTitle">Cuisine</h1>
        <p id="cuisineDesc">Discover authentic flavors, delivered to your door.</p>
      </div>
    </section>

    <section class="categories">
      <h2 class="section-title">Dishes</h2>
      <div class="product-grid" id="cuisineDishes">
        <p>Loading dishes...</p>
      </div>
    </section>

    <footer class="main-footer">
      <div class="footer-bottom">
        <p>&copy; 2026 Uni-Bite Restaurant — Designed for Excellence</p>
      </div>
    </footer>

    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
      <div class="cart-header">
        <h3>Your Cart</h3>
        <button class="cart-close" id="cartClose" aria-label="Close cart">&times;</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <p class="cart-empty" id="cartEmpty">Your cart is empty.</p>
      <div class="cart-footer">
        <div class="cart-total-row"><span>Total</span><span id="cartTotal">UGX 0</span></div>
        <button class="checkout-btn" id="checkoutBtn">Checkout</button>
      </div>
    </aside>
    <script src="../cart.js"></script>
    <script src="../cuisine.js"></script>
  </body>
</html>
